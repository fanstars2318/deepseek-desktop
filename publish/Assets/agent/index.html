<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DeepSeek · Qwen Code</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
  <link rel="stylesheet" href="https://ds-inject.local/ds-theme.css" />
  <link rel="stylesheet" href="agent.css" />
</head>
<body>
  <div class="ds-app">
    <aside class="ds-sidebar">
      <div class="ds-sidebar-head">
        <a class="ds-brand" href="#" id="brand-home" aria-label="DeepSeek">
          <span class="ds-brand-whale" aria-hidden="true">
            <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <circle cx="16" cy="14" r="9" fill="#4D6BFE"/>
              <path d="M7 23c2.5 1.2 5.5 1.8 9 1.8s6.5-.6 9-1.8" stroke="#4D6BFE" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </span>
          <span class="ds-brand-text">deepseek</span>
        </a>
        <div class="ds-sidebar-head-actions">
          <button type="button" class="ds-icon-btn" id="btn-storage-settings" title="存储与清理" aria-label="存储设置">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 7h16M4 12h16M4 17h10"/></svg>
          </button>
        </div>
      </div>

      <button type="button" class="ds-new-chat" id="btn-new-chat">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
        <span>开启新对话</span>
      </button>

      <div class="ds-sidebar-section">
        <div class="ds-storage-bar" id="storage-bar">
          <span class="ds-storage-stats" id="storage-stats">本地存储</span>
          <button type="button" class="ds-storage-btn" id="btn-manage-sessions">管理</button>
        </div>
        <div class="ds-manage-bar ds-hidden" id="manage-bar">
          <button type="button" class="ds-storage-btn" id="btn-select-all">全选</button>
          <button type="button" class="ds-storage-btn ds-danger" id="btn-delete-selected">删除</button>
          <button type="button" class="ds-storage-btn" id="btn-manage-done">完成</button>
        </div>
        <div class="ds-session-list" id="session-list"></div>
      </div>

      <div class="ds-sidebar-foot">
        <span class="ds-login-status" id="login-pill" title="登录状态">
          <span class="ds-status-dot" id="login-dot"></span>
          <span id="login-label">检测中…</span>
        </span>
        <button type="button" class="ds-sidebar-link" id="btn-goto-chat">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 18l6-6-6-6"/></svg>
          普通对话
        </button>
        <button type="button" class="ds-sidebar-link" id="btn-mcp">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
          MCP 设置
        </button>
      </div>
    </aside>

    <main class="ds-main">
      <button type="button" class="ds-mode-float ds-on" id="mode-float" title="Agent 模式 · 点击切换普通对话">
        <span class="ds-mode-float-icon" aria-hidden="true">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 2a4 4 0 0 1 4 4v1h1a3 3 0 0 1 3 3v9a3 3 0 0 1-3 3H7a3 3 0 0 1-3-3V10a3 3 0 0 1 3-3h1V6a4 4 0 0 1 4-4z"/></svg>
        </span>
        <span id="mode-float-label">Agent</span>
      </button>

      <div class="ds-chat-scroll" id="chat-scroll">
        <div class="ds-empty" id="empty-state">
          <div class="ds-empty-icon" aria-hidden="true">
            <svg viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="22" fill="#EEF2FF"/><path d="M24 14v12M18 20h12" stroke="#4D6BFE" stroke-width="2" stroke-linecap="round"/></svg>
          </div>
          <h2 class="ds-empty-title">今天有什么可以帮到你？</h2>
          <p class="ds-empty-sub">DeepSeek 外壳 · Qwen Code Core（C#）· Chat2API · MCP</p>
        </div>
        <div class="ds-messages" id="messages"></div>
      </div>

      <footer class="ds-composer-wrap">
        <div class="ds-login-banner" id="login-banner" hidden>
          <span>请先在「普通对话」中登录 DeepSeek</span>
          <button type="button" class="ds-text-btn" id="btn-login-goto">去登录</button>
        </div>
        <div class="ds-composer-outer">
          <div class="ds-composer">
            <div class="ds-file-chips" id="file-chips" hidden></div>
            <textarea
              id="chat-input"
              rows="1"
              placeholder="给 DeepSeek 发送消息 · /help · @文件路径"
            ></textarea>
            <div class="ds-composer-bar">
              <div class="ds-composer-tools">
                <input type="file" id="file-input" class="ds-file-input" multiple accept=".txt,.md,.json,.csv,.log,.py,.js,.ts,.cs,.html,.xml,.yaml,.yml,.pdf,text/*" />
                <button type="button" class="ds-tool-btn" id="btn-attach" title="上传文件" aria-label="上传文件">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
                </button>
              </div>
              <button type="button" class="ds-send-btn" id="btn-send" disabled aria-label="发送">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3.4 20.6l17.6-8.2c.8-.4.8-1.5 0-1.9L3.4 2.3c-.8-.4-1.6.3-1.4 1.2l2.1 7.3c.1.4.5.7.9.7h6.2c.6 0 1 .4 1 1s-.4 1-1 1H5c-.4 0-.8.3-.9.7l-2.1 7.3c-.2.9.6 1.6 1.4 1.2z"/></svg>
              </button>
            </div>
          </div>
        </div>
      </footer>
    </main>
  </div>

  <script src="https://ds-inject.local/bridge.js"></script>
  <script src="agent-app.js"></script>
</body>
</html>
