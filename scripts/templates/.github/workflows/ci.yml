name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            9.0.x
            10.0.x

      - name: Supply chain audit
        shell: pwsh
        run: ./scripts/audit-supply-chain.ps1
        continue-on-error: true

      - name: Build and test
        shell: pwsh
        run: ./build.ps1

      - name: Clean artifacts check
        shell: pwsh
        run: |
          if (Test-Path ./bin) { throw "bin/ should not exist after build; use publish/ only" }
