<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DeepSeek · Agent</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
  <link rel="stylesheet" href="https://ds-inject.local/ds-theme.css" />
  <link rel="stylesheet" href="agent.css" />
</head>
<body>
  <div class="ds-app">
    <aside class="ds-sidebar">
      <div class="ds-sidebar-head">
        <a class="ds-brand" href="#" id="brand-home" aria-label="DeepSeek">
          <span class="ds-brand-whale" aria-hidden="true">
            <svg viewBox="0 0 35 26" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path fill="currentColor" transform="scale(1.4583333333, 1.0833333333)" d="M23.748 4.651c-.254-.124-.364.113-.512.233c-.051.04-.094.09-.137.137c-.372.397-.806.657-1.373.626c-.829-.046-1.537.214-2.163.848c-.133-.782-.575-1.248-1.247-1.548c-.352-.155-.708-.311-.955-.65c-.172-.24-.219-.509-.305-.774c-.055-.16-.11-.323-.293-.35c-.2-.031-.278.136-.356.276c-.313.572-.434 1.202-.422 1.84c.027 1.436.633 2.58 1.838 3.393c.137.094.172.187.129.323c-.082.28-.18.553-.266.833c-.055.179-.137.218-.328.14a5.5 5.5 0 0 1-1.737-1.179c-.857-.828-1.631-1.743-2.597-2.46a12 12 0 0 0-.689-.47c-.985-.957.13-1.743.387-1.836c.27-.098.094-.433-.778-.428c-.872.003-1.67.295-2.687.685a3 3 0 0 1-.465.136a9.6 9.6 0 0 0-2.883-.101c-1.885.21-3.39 1.1-4.497 2.622C.082 8.776-.231 10.854.152 13.02c.403 2.284 1.568 4.175 3.36 5.653c1.857 1.533 3.997 2.284 6.438 2.14c1.482-.085 3.132-.284 4.994-1.86c.47.234.962.328 1.78.398c.629.058 1.235-.031 1.705-.129c.735-.155.684-.836.418-.961c-2.155-1.004-1.682-.595-2.112-.926c1.095-1.295 2.768-3.598 3.284-6.733c.05-.346.115-.834.108-1.114c-.004-.171.035-.238.23-.257a4.2 4.2 0 0 0 1.545-.475c1.397-.763 1.96-2.016 2.093-3.517c.02-.23-.004-.467-.247-.588M11.58 18.168c-2.088-1.642-3.101-2.183-3.52-2.16c-.39.024-.32.472-.234.763c.09.288.207.487.371.74c.114.167.192.416-.113.603c-.673.416-1.842-.14-1.897-.168c-1.361-.801-2.5-1.86-3.301-3.306c-.775-1.393-1.225-2.888-1.299-4.482c-.02-.385.094-.522.477-.592a4.7 4.7 0 0 1 1.53-.038c2.131.311 3.946 1.264 5.467 2.774c.868.86 1.525 1.887 2.202 2.89c.72 1.066 1.494 2.082 2.48 2.915c.348.291.626.513.892.677c-.802.09-2.14.109-3.055-.615zm1.001-6.44a.306.306 0 0 1 .415-.287a.3.3 0 0 1 .113.074a.3.3 0 0 1 .086.214c0 .17-.136.307-.308.307a.303.303 0 0 1-.306-.307m3.11 1.596c-.2.081-.4.151-.591.16a1.25 1.25 0 0 1-.798-.254c-.274-.23-.47-.358-.551-.758a1.7 1.7 0 0 1 .015-.588c.07-.327-.007-.537-.238-.727c-.188-.156-.426-.199-.689-.199a.6.6 0 0 1-.254-.078a.253.253 0 0 1-.114-.358a1 1 0 0 1 .192-.21c.356-.202.767-.136 1.146.016c.352.144.618.408 1.001.782c.392.451.462.576.685.915c.176.264.336.536.446.848c.066.194-.02.353-.25.45"/>
            </svg>
          </span>
          <span class="ds-brand-text">deepseek</span>
        </a>
        <div class="ds-sidebar-head-actions">
          <button type="button" class="ds-icon-btn" id="btn-sidebar-settings" aria-label="设置" aria-haspopup="menu" aria-expanded="false" title="设置">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="12" r="3"/>
              <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="button" class="ds-new-chat" id="btn-new-chat">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
        <span>开启新对话</span>
      </button>
    </aside>

    <main class="ds-main">
      <div class="ds-embedded-panel" id="embedded-panel" hidden>
        <header class="ds-embedded-head">
          <button type="button" class="ds-embedded-back" id="embedded-back" aria-label="返回">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
            <span>返回</span>
          </button>
          <h1 class="ds-embedded-title" id="embedded-panel-title">设置</h1>
        </header>
        <div class="ds-embedded-body">
          <div class="ds-embedded-loading" id="embedded-panel-loading" aria-live="polite">
            <span class="ds-embedded-spinner" aria-hidden="true"></span>
            <span>加载中…</span>
          </div>
          <iframe class="ds-embedded-frame" id="embedded-frame" title="内嵌面板" src="about:blank"></iframe>
        </div>
      </div>

      <button type="button" class="ds-mode-float ds-on" id="mode-float" data-ds-workmode-floater="1" title="当前为 Agent 模式，点击切换到普通对话">
        <span class="ds-mode-float-icon" aria-hidden="true">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 2a4 4 0 0 1 4 4v1h1a3 3 0 0 1 3 3v9a3 3 0 0 1-3 3H7a3 3 0 0 1-3-3V10a3 3 0 0 1 3-3h1V6a4 4 0 0 1 4-4z"/></svg>
        </span>
        <span id="mode-float-label">Agent</span>
      </button>

      <div class="ds-chat-scroll" id="chat-scroll">
        <div class="ds-empty" id="empty-state">
          <h2 class="ds-empty-title">今天有什么可以帮到你？</h2>
        </div>
        <div class="ds-messages" id="messages"></div>
      </div>

      <footer class="ds-composer-wrap">
        <div class="ds-login-banner" id="login-banner" hidden>
          <span>请先在「普通对话」中登录 DeepSeek</span>
          <button type="button" class="ds-text-btn" id="btn-login-goto">去登录</button>
        </div>
        <div class="ds-composer-outer">
          <div class="ds-composer">
            <div class="ds-file-chips" id="file-chips" hidden></div>
            <textarea
              id="chat-input"
              rows="1"
              placeholder="给 DeepSeek 发送消息 · /help · @文件路径"
            ></textarea>
            <div class="ds-composer-bar">
              <div class="ds-composer-tools">
                <input type="file" id="file-input" class="ds-file-input" multiple accept=".txt,.md,.json,.csv,.log,.py,.js,.ts,.cs,.html,.xml,.yaml,.yml,.pdf,text/*" />
                <button type="button" class="ds-feature-pill" id="btn-deep-think" aria-pressed="true" title="深度思考（Chat2API reasoning_effort）">
                  <svg class="ds-feature-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true"><circle cx="12" cy="12" r="2.2" stroke="currentColor" stroke-width="1.6"/><ellipse cx="12" cy="12" rx="8" ry="3.2" stroke="currentColor" stroke-width="1.4"/><ellipse cx="12" cy="12" rx="3.2" ry="8" stroke="currentColor" stroke-width="1.4" transform="rotate(60 12 12)"/><ellipse cx="12" cy="12" rx="3.2" ry="8" stroke="currentColor" stroke-width="1.4" transform="rotate(-60 12 12)"/></svg>
                  <span>深度思考</span>
                </button>
                <button type="button" class="ds-feature-pill" id="btn-smart-search" aria-pressed="false" title="智能搜索（Chat2API web_search）">
                  <svg class="ds-feature-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.6"/><path d="M2 12h20M12 2c2.8 3.2 2.8 16.8 0 20M12 2c-2.8 3.2-2.8 16.8 0 20" stroke="currentColor" stroke-width="1.4"/></svg>
                  <span>智能搜索</span>
                </button>
                <button type="button" class="ds-tool-btn" id="btn-attach" title="上传文件" aria-label="上传文件">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
                </button>
              </div>
              <button type="button" class="ds-send-btn" id="btn-send" disabled aria-label="发送">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3.4 20.6l17.6-8.2c.8-.4.8-1.5 0-1.9L3.4 2.3c-.8-.4-1.6.3-1.4 1.2l2.1 7.3c.1.4.5.7.9.7h6.2c.6 0 1 .4 1 1s-.4 1-1 1H5c-.4 0-.8.3-.9.7l-2.1 7.3c-.2.9.6 1.6 1.4 1.2z"/></svg>
              </button>
            </div>
          </div>
        </div>
      </footer>
    </main>
  </div>

  <button type="button" class="ds-settings-backdrop" id="settings-backdrop" hidden aria-hidden="true" tabindex="-1"></button>
  <div class="ds-settings-popover" id="settings-popover" hidden role="menu" aria-label="设置菜单">
    <div class="ds-login-status" id="login-pill" title="登录状态" role="presentation">
      <span class="ds-status-dot" id="login-dot"></span>
      <span id="login-label">检测中…</span>
    </div>
    <button type="button" class="ds-sidebar-link" id="btn-chat2api" role="menuitem" title="API 管理（供应商、模型、API Key）">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 7h16M4 12h10M4 17h16"/><circle cx="18" cy="12" r="3"/></svg>
      API 管理
    </button>
    <button type="button" class="ds-sidebar-link" id="btn-mcp" role="menuitem" title="DeepSeek 设置（Agent、MCP、工作区）">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
      设置
    </button>
  </div>

  <script src="https://ds-inject.local/bridge.js"></script>
  <script src="https://ds-inject.local/work-mode-client.js"></script>
  <script src="agent-app.js?v=15"></script>
</body>
</html>
